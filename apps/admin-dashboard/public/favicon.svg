<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Left wing building -->
  <rect x="4" y="16" width="6" height="13" rx="1" fill="#334155"/>
  <rect x="5" y="18" width="2" height="2" rx="0.3" fill="#60a5fa" opacity="0.7"/>
  <rect x="7.5" y="18" width="2" height="2" rx="0.3" fill="#60a5fa" opacity="0.4"/>
  <!-- Right wing building -->
  <rect x="22" y="13" width="6" height="16" rx="1" fill="#334155"/>
  <rect x="23" y="15" width="2" height="2" rx="0.3" fill="#60a5fa" opacity="0.4"/>
  <rect x="25.5" y="15" width="2" height="2" rx="0.3" fill="#60a5fa" opacity="0.7"/>
  <rect x="23" y="19" width="2" height="2" rx="0.3" fill="#60a5fa" opacity="0.6"/>
  <!-- Center tower -->
  <rect x="11" y="8" width="10" height="21" rx="1" fill="#e2e8f0"/>
  <!-- Tower windows -->
  <rect x="12.5" y="11" width="2.5" height="2.5" rx="0.4" fill="#3b82f6"/>
  <rect x="17" y="11" width="2.5" height="2.5" rx="0.4" fill="#1d4ed8"/>
  <rect x="12.5" y="16" width="2.5" height="2.5" rx="0.4" fill="#1d4ed8"/>
  <rect x="17" y="16" width="2.5" height="2.5" rx="0.4" fill="#3b82f6"/>
  <!-- Tower door -->
  <rect x="14" y="23" width="4" height="6" rx="0.5" fill="#f59e0b"/>
  <circle cx="17.2" cy="26" r="0.6" fill="#0f172a"/>
  <!-- Spire -->
  <rect x="15.3" y="3" width="1.5" height="6" rx="0.5" fill="url(#gold)"/>
  <polygon points="16,1 17.8,5 14.2,5" fill="url(#gold)"/>
</svg>
