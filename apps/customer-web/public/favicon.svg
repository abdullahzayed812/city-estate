<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1e3355"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Far left small building -->
  <rect x="2" y="20" width="4" height="10" rx="0.5" fill="#475569"/>
  <!-- Left building -->
  <rect x="7" y="17" width="5" height="13" rx="0.5" fill="#64748b"/>
  <rect x="8" y="19" width="1.5" height="2" rx="0.3" fill="#93c5fd" opacity="0.7"/>
  <rect x="10" y="19" width="1.5" height="2" rx="0.3" fill="#93c5fd" opacity="0.4"/>
  <!-- Center tall building -->
  <rect x="13" y="11" width="7" height="19" rx="0.5" fill="#e2e8f0"/>
  <rect x="14.5" y="13" width="1.8" height="2" rx="0.3" fill="#1d4ed8" opacity="0.7"/>
  <rect x="17" y="13" width="1.8" height="2" rx="0.3" fill="#1d4ed8"/>
  <rect x="14.5" y="17" width="1.8" height="2" rx="0.3" fill="#3b82f6" opacity="0.6"/>
  <rect x="17" y="17" width="1.8" height="2" rx="0.3" fill="#3b82f6"/>
  <!-- Door center -->
  <rect x="15.2" y="25" width="3" height="5" rx="0.3" fill="#0a1628" opacity="0.5"/>
  <!-- Right building -->
  <rect x="21" y="15" width="5" height="15" rx="0.5" fill="#64748b"/>
  <rect x="22" y="17" width="1.5" height="2" rx="0.3" fill="#93c5fd" opacity="0.5"/>
  <rect x="24" y="17" width="1.5" height="2" rx="0.3" fill="#93c5fd" opacity="0.7"/>
  <!-- Far right -->
  <rect x="27" y="19" width="3" height="11" rx="0.5" fill="#475569"/>
  <!-- Location pin -->
  <circle cx="16.5" cy="7" r="4.5" fill="url(#pin)"/>
  <circle cx="16.5" cy="7" r="2" fill="white"/>
  <polygon points="16.5,13 14,9 19,9" fill="url(#pin)"/>
</svg>
