version: '3.9'

services:
  # ============================================================
  # Infrastructure (internal only, not exposed to host)
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: realestate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-realestate_db}
      MYSQL_USER: ${DB_USER:-realestate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./shared/database/src/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Backend Services (internal only, reachable via gateway)
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: realestate_auth
    restart: unless-stopped
    env_file: services/auth-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    container_name: realestate_property
    restart: unless-stopped
    env_file: services/property-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: realestate_booking
    restart: unless-stopped
    env_file: services/booking-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: realestate_chat
    restart: unless-stopped
    env_file: services/chat-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: realestate_notification
    restart: unless-stopped
    env_file: services/notification-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    container_name: realestate_media
    restart: unless-stopped
    env_file: services/media-service/.env

  # ============================================================
  # API Gateway — port 8080 (avoids conflict with other VPS systems)
  # Mobile apps connect here: http://VPS_IP:8080/api
  # ============================================================
  gateway:
    image: nginx:alpine
    container_name: realestate_gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - property-service
      - booking-service
      - chat-service
      - media-service
      - notification-service

  # ============================================================
  # Web Apps
  # admin-dashboard : http://VPS_IP:8084  (8081 reserved for Metro bundler)
  # broker-web      : http://VPS_IP:8082
  # customer-web    : http://VPS_IP:8083
  # Each app proxies /api/ and /socket.io/ through the gateway internally
  # ============================================================
  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: realestate_admin
    restart: unless-stopped
    ports:
      - "8084:80"
    depends_on:
      - gateway

  broker-web:
    build:
      context: .
      dockerfile: apps/broker-web/Dockerfile
    container_name: realestate_broker_web
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - gateway
      - chat-service

  customer-web:
    build:
      context: .
      dockerfile: apps/customer-web/Dockerfile
    container_name: realestate_customer_web
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - gateway
      - chat-service

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
