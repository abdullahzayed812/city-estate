worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server 127.0.0.1:3001;
  }

  upstream property_service {
    server 127.0.0.1:3002;
  }

  upstream booking_service {
    server 127.0.0.1:3003;
  }

  upstream chat_service {
    server 127.0.0.1:3004;
  }

  upstream notification_service {
    server 127.0.0.1:3005;
  }

  upstream media_service {
    server 127.0.0.1:3006;
  }

  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  server {
    listen 80;
    server_name _;

    location /api/auth {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users {
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/properties {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://property_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/brokers {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://property_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/broker {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://property_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analytics {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://property_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bookings {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://booking_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/chats {
      proxy_pass http://chat_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io {
      proxy_pass http://chat_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    location /api/media {
      client_max_body_size 100M;
      proxy_pass http://media_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_request_buffering off;
    }

    location /api/notifications {
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # # Vite HMR websocket
    # location /@vite/ {
    #   proxy_pass http://127.0.0.1:5173;
    #   proxy_http_version 1.1;
    #   proxy_set_header Upgrade $http_upgrade;
    #   proxy_set_header Connection "upgrade";
    #   proxy_set_header Host $host;
    # }

    # # Admin dashboard (Vite dev server)
    # location / {
    #   proxy_pass http://127.0.0.1:5173;
    #   proxy_http_version 1.1;
    #   proxy_set_header Upgrade $http_upgrade;
    #   proxy_set_header Connection "upgrade";
    #   proxy_set_header Host $host;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }
  }
}
